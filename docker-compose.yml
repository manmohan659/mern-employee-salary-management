services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db_penggajian3
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Backend/db/db_penggajian3.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      APP_PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: db_penggajian3
      DB_USER: root
      DB_PASSWORD: root123
      SESS_SECRET: sipeka-local-dev-secret
      NODE_ENV: development
      CORS_ORIGIN: http://localhost,http://localhost:80,http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/public/images

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_uploads:
