services:
  backend:
    image: ${ECR_REGISTRY}/sipeka-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      APP_PORT: 5000
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-db_penggajian3}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SESS_SECRET: ${SESS_SECRET}
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - backend_uploads:/app/public/images
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ${ECR_REGISTRY}/sipeka-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  backend_uploads:
