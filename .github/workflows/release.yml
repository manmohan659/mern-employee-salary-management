name: Semantic Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.INFRA_REPO_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install -g semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/npm

      - name: Run semantic release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.INFRA_REPO_PAT }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          npx semantic-release  | tee release-output.txt
          if grep -q "Published release" release-output.txt; then
            VERSION=$(grep "next release version" release-output.txt | grep -oP '\d+\.\d+\.\d+' | tail -1)
            if [ -z "$VERSION" ]; then
              VERSION=$(grep "Published release" release-output.txt | grep -oP '\d+\.\d+\.\d+' | tail -1)
            fi
            echo "released=true" >> $GITHUB_OUTPUT
            echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

      - name: Log release result
        run: |
          if [ "${{ steps.semantic.outputs.released }}" = "true" ]; then
            echo "Published ${{ steps.semantic.outputs.version }}"
            echo "RC promotion will be triggered after QA smoke tests pass"
          else
            echo "No release created for this commit"
          fi
