name: Semantic Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.INFRA_REPO_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install -g semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/npm

      - name: Run semantic release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.INFRA_REPO_PAT }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          npx semantic-release 2>&1 | tee release-output.txt
          if grep -q "Published release" release-output.txt; then
            VERSION=$(grep "next release version" release-output.txt | grep -oP '\d+\.\d+\.\d+' | tail -1)
            if [ -z "$VERSION" ]; then
              VERSION=$(grep "Published release" release-output.txt | grep -oP '\d+\.\d+\.\d+' | tail -1)
            fi
            echo "released=true" >> $GITHUB_OUTPUT
            echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.semantic.outputs.released == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Wait for images in ECR
        if: steps.semantic.outputs.released == 'true'
        run: |
          echo "Waiting for build-push to finish pushing images to ECR..."
          for i in $(seq 1 30); do
            RESULT=$(aws ecr batch-get-image --repository-name sipeka-backend --image-ids imageTag=${{ github.sha }} --query 'images[0].imageId.imageTag' --output text 2>/dev/null)
            if [ "$RESULT" = "${{ github.sha }}" ]; then
              echo "Image found in ECR after $((i * 10)) seconds"
              exit 0
            fi
            echo "Attempt $i/30 - image not yet in ECR, waiting 10s..."
            sleep 10
          done
          echo "Timed out waiting for image in ECR"
          exit 1

      - name: Trigger RC deployment
        if: steps.semantic.outputs.released == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_PAT }}
          repository: ${{ github.repository_owner }}/sipeka-infra
          event-type: deploy-rc
          client-payload: '{"rc_tag": "${{ steps.semantic.outputs.version }}", "source_tag": "${{ github.sha }}"}'
