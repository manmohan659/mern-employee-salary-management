name: Build & Push to ECR

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-west-2
  ECR_BACKEND: sipeka-backend
  ECR_FRONTEND: sipeka-frontend

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & test backend
        working-directory: Backend
        run: |
          npm ci
          npm test

      - name: Install & test frontend
        working-directory: Frontend
        run: |
          npm install --legacy-peer-deps
          npm test
          npm run build

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_BACKEND:$IMAGE_TAG -t $REGISTRY/$ECR_BACKEND:latest ./Backend
          docker push $REGISTRY/$ECR_BACKEND:$IMAGE_TAG
          docker push $REGISTRY/$ECR_BACKEND:latest

      - name: Build & push frontend
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_FRONTEND:$IMAGE_TAG -t $REGISTRY/$ECR_FRONTEND:latest ./Frontend
          docker push $REGISTRY/$ECR_FRONTEND:$IMAGE_TAG
          docker push $REGISTRY/$ECR_FRONTEND:latest

      - name: Trigger infra repo deployment
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_PAT }}
          repository: ${{ github.repository_owner }}/sipeka-infra
          event-type: deploy-qa
          client-payload: '{"image_tag": "${{ github.sha }}", "ref": "${{ github.ref }}"}'
